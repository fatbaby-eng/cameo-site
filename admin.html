<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarCrack Productions — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --black-card: #111114;
    --black-elevated: #18181c;
    --silver: #9a9aaa;
    --silver-dim: #5a5a6a;
    --silver-faint: #2a2a34;
    --red: #c41e3a;
    --white: #f0eff2;
    --font-heading: 'Bebas Neue', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); padding: 40px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1, h2, h3 { font-family: var(--font-heading); letter-spacing: 2px; }
  h1 { font-size: 48px; margin-bottom: 30px; text-align: center; color: var(--red); }
  h2 { font-size: 28px; margin-bottom: 20px; border-bottom: 1px solid var(--silver-faint); padding-bottom: 10px; }
  
  /* Auth Screen */
  #auth-screen { max-width: 400px; margin: 100px auto; background: var(--black-card); padding: 40px; border: 1px solid var(--silver-faint); border-radius: 8px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 12px; text-transform: uppercase; color: var(--silver); margin-bottom: 8px; }
  .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--black-elevated); border: 1px solid var(--silver-faint); color: var(--white); border-radius: 4px; font-family: var(--font-body); }
  .btn { width: 100%; padding: 14px; background: var(--red); color: var(--white); border: none; font-family: var(--font-body); font-weight: 600; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: 0.3s; }
  .btn:hover { background: #e63550; }
  .btn-small { width: auto; padding: 8px 16px; font-size: 12px; }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: var(--white); }
  
  /* Dashboard */
  #dashboard-screen { display: none; }
  .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
  .tab { padding: 12px 24px; background: var(--black-card); border: 1px solid var(--silver-faint); color: var(--silver); cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 14px; font-weight: 500; }
  .tab.active { background: var(--red); color: var(--white); border-color: var(--red); }
  .tab-content { display: none; background: var(--black-card); padding: 30px; border: 1px solid var(--silver-faint); border-radius: 8px; }
  .tab-content.active { display: block; }
  
  /* Lists */
  .item-list { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--black-elevated); border: 1px solid var(--silver-faint); border-radius: 4px; }
  .item-info strong { display: block; font-size: 18px; margin-bottom: 4px; }
  .item-info span { font-size: 13px; color: var(--silver); }
  
  #logout-btn { position: absolute; top: 40px; right: 40px; }
  .error { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }
  .success { color: #4ade80; font-size: 13px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>

<div class="container">
  <h1>EarCrack CMS</h1>

  <!-- LOGIN SCREEN -->
  <div id="auth-screen">
    <h2>Admin Login</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" id="login-btn">Log In</button>
    <div id="auth-msg" class="error"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen">
    <button class="btn btn-small btn-danger" id="logout-btn">Log Out</button>
    
    <div class="tabs">
      <div class="tab active" data-target="tab-videos">Manage Videos</div>
      <div class="tab" data-target="tab-beats">Manage Beats</div>
      <div class="tab" data-target="tab-messages">Inbox / Forms</div>
    </div>

    <!-- VIDEOS TAB -->
    <div class="tab-content active" id="tab-videos">
      <h2>Add New Video</h2>
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" id="vid-title" placeholder="e.g. Live Performance 2026">
      </div>
      <div class="form-group">
        <label>Platform</label>
        <select id="vid-platform">
          <option value="youtube">YouTube</option>
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
        </select>
      </div>
      <div class="form-group">
        <label>Video URL or Embed Code</label>
        <input type="text" id="vid-url" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <button class="btn btn-small" id="add-vid-btn">Add Video to Website</button>
      <div id="vid-msg"></div>

      <h2 style="margin-top: 40px;">Current Videos</h2>
      <div class="item-list" id="vid-list">Loading...</div>
    </div>

    <!-- BEATS TAB -->
    <div class="tab-content" id="tab-beats">
      <h2>Add Beatstars Embed</h2>
      <div class="form-group">
        <label>Beat Title</label>
        <input type="text" id="beat-title" placeholder="e.g. Smooth R&B Beat">
      </div>
      <div class="form-group">
        <label>Beatstars URL or Embed Code</label>
        <input type="text" id="beat-url" placeholder="Paste the Beatstars URL or iframe code here">
      </div>
      <button class="btn btn-small" id="add-beat-btn">Add Beat to Website</button>
      <div id="beat-msg"></div>

      <h2 style="margin-top: 40px;">Current Beats</h2>
      <div class="item-list" id="beat-list">Loading...</div>
    </div>

    <!-- MESSAGES TAB -->
    <div class="tab-content" id="tab-messages">
      <h2>Contact Form Messages</h2>
      <div class="item-list" id="msg-list">Loading messages...</div>
    </div>
  </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
